services:
  # PostgreSQL 数据库
  postgres:
    image: pgvector/pgvector:pg17
    container_name: vocata-postgres-dev
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vocata_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-vocata_db}"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: vocata-redis-dev
    ports:
      - "${REDIS_EXPOSE_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 后端服务
  vocata-server:
    build:
      context: ./vocata-server
      dockerfile: Dockerfile
      args:
        SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
    container_name: vocata-server-dev
    ports:
      - "${SERVER_PORT:-9009}:9009"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      SERVER_PORT: 9009
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-vocata_db}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres123}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DATABASE: ${REDIS_DATABASE:-0}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      AI_LLM_PROVIDER: ${AI_LLM_PROVIDER:-qiniu}
      AI_STT_PROVIDER: ${AI_STT_PROVIDER:-qiniu}
      AI_TTS_PROVIDER: ${AI_TTS_PROVIDER:-xunfei}
      XUNFEI_TTS_APP_ID: ${XUNFEI_TTS_APP_ID:-}
      XUNFEI_TTS_API_KEY: ${XUNFEI_TTS_API_KEY:-}
      XUNFEI_TTS_SECRET_KEY: ${XUNFEI_TTS_SECRET_KEY:-}
      QINIU_ACCESS_KEY: ${QINIU_ACCESS_KEY:-}
      QINIU_SECRET_KEY: ${QINIU_SECRET_KEY:-}
      QINIU_BUCKET: ${QINIU_BUCKET:-}
      QINIU_DOMAIN: ${QINIU_DOMAIN:-}
      QINIU_REGION: ${QINIU_REGION:-huadong}
      QINIU_KEY_PREFIX: ${QINIU_KEY_PREFIX:-}
      QINIU_AI_API_KEY: ${QINIU_AI_API_KEY:-}
      QINIU_AI_BASE_URL: ${QINIU_AI_BASE_URL:-https://openai.qiniu.com/v1}
      QINIU_AI_MODEL: ${QINIU_AI_MODEL:-x-ai/grok-4-fast}
      QINIU_AI_TIMEOUT: ${QINIU_AI_TIMEOUT:-60}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash-lite}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-3.5-turbo}
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-}
      SILICONFLOW_AI_MODEL: ${SILICONFLOW_AI_MODEL:-Qwen/Qwen3-8B}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./vocata-server/logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9009/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # 前端客户端
  vocata-web:
    build:
      context: ./vocata-web
      dockerfile: Dockerfile
      args:
        BUILD_MODE: ${WEB_BUILD_MODE:-production}
        VITE_APP_URL: ${VITE_APP_URL:-http://localhost:9009}
    container_name: vocata-web-dev
    ports:
      - "${WEB_PORT:-3000}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      vocata-server:
        condition: service_healthy

  # 管理后台
  vocata-admin:
    build:
      context: ./vocata-admin
      dockerfile: Dockerfile
      args:
        BUILD_MODE: ${ADMIN_BUILD_MODE:-production}
        VITE_APP_URL: ${VITE_APP_URL:-http://localhost:9009}
    container_name: vocata-admin-dev
    ports:
      - "${ADMIN_PORT:-3001}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      vocata-server:
        condition: service_healthy

  # pgAdmin (数据库管理工具)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: vocata-pgadmin-dev
    profiles: ["tools"]
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@vocata.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin123}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      - postgres

  # MailHog (邮件测试工具)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: vocata-mailhog-dev
    profiles: ["tools"]
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_WEB_PORT:-8025}:8025"

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: ${COMPOSE_PROJECT_NAME:-vocata-dev}-network
