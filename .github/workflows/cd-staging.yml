name: Deploy to Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  deploy-staging:
    runs-on: ubuntu-latest

    steps:
    - name: йғЁзҪІеҲ°жңҚеҠЎеҷЁ
      uses: appleboy/ssh-action@v1.0.3
      env:
        GIT_REF: ${{ github.ref_name }}
        GIT_SHA: ${{ github.sha }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_TOKEN: ${{ github.token }}
      with:
        host: ${{ secrets.STAGING_HOST }}
        username: ${{ secrets.STAGING_USER }}
        key: ${{ secrets.STAGING_SSH_KEY }}
        port: 22
        script_stop: true
        envs: GIT_REF,GIT_SHA,GITHUB_REPOSITORY,GITHUB_TOKEN
        script: |
          set -e

          APP_DIR=/home/deploy/deploy/vocata
          REPO_DIR=$APP_DIR/repo
          ENV_FILE=$APP_DIR/.env
          LEGACY_ENV_FILE=$APP_DIR/data/vocata-staging.env
          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          mkdir -p "$APP_DIR"

          if [ ! -f "$ENV_FILE" ] && [ -f "$LEGACY_ENV_FILE" ]; then
            cp "$LEGACY_ENV_FILE" "$ENV_FILE"
          fi

          if [ ! -f "$ENV_FILE" ]; then
            echo "зјәе°‘йғЁзҪІзҺҜеўғж–Үд»¶: $ENV_FILE"
            echo "иҜ·е…ҲеңЁжңҚеҠЎеҷЁдёҠеҮҶеӨҮеҘҪ .envпјҢеҶҚйҮҚж–°жү§иЎҢе·ҘдҪңжөҒгҖӮ"
            exit 1
          fi

          if [ ! -d "$REPO_DIR/.git" ]; then
            rm -rf "$REPO_DIR"
            git clone --branch "$GIT_REF" --depth 1 "$REPO_URL" "$REPO_DIR"
          else
            cd "$REPO_DIR"
            git remote set-url origin "$REPO_URL"
            git fetch --depth 1 origin "$GIT_REF"
            git checkout "$GIT_REF"
            git reset --hard "origin/$GIT_REF"
          fi

          cd "$REPO_DIR"
          git remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"

          echo "еҪ“еүҚжҸҗдәӨ: $GIT_SHA"
          docker compose --env-file "$ENV_FILE" up -d --build

          echo "=== е®№еҷЁзҠ¶жҖҒ ==="
          docker compose ps

          echo "=== еҗҺз«ҜеҒҘеә·жЈҖжҹҘ ==="
          curl -fsS http://127.0.0.1:9009/api/health

    - name: еӨұиҙҘж—¶иҫ“еҮәж—Ҙеҝ—
      if: failure()
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.STAGING_HOST }}
        username: ${{ secrets.STAGING_USER }}
        key: ${{ secrets.STAGING_SSH_KEY }}
        port: 22
        script_stop: false
        script: |
          APP_DIR=/home/deploy/deploy/vocata
          REPO_DIR=$APP_DIR/repo

          if [ -d "$REPO_DIR" ]; then
            cd "$REPO_DIR"
            echo "=== docker compose ps ==="
            docker compose ps || true
            echo "=== vocata-server logs ==="
            docker compose logs --tail=100 vocata-server || true
            echo "=== vocata-web logs ==="
            docker compose logs --tail=60 vocata-web || true
            echo "=== vocata-admin logs ==="
            docker compose logs --tail=60 vocata-admin || true
          fi

    - name: йғЁзҪІз»“жһңжҠҘе‘Ҡ
      if: always()
      run: |
        echo "## Staging йғЁзҪІз»“жһң" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "- зҺҜеўғ: staging" >> "$GITHUB_STEP_SUMMARY"
        echo "- еҲҶж”Ҝ: ${{ github.ref_name }}" >> "$GITHUB_STEP_SUMMARY"
        echo "- жҸҗдәӨ: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
        echo "- жңҚеҠЎеҷЁ: \`${{ secrets.STAGING_HOST }}\`" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"

        if [ "${{ job.status }}" = "success" ]; then
          echo "вң… йғЁзҪІжҲҗеҠҹ" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- з”ЁжҲ·з«Ҝ: http://${{ secrets.STAGING_HOST }}:3000" >> "$GITHUB_STEP_SUMMARY"
          echo "- з®ЎзҗҶз«Ҝ: http://${{ secrets.STAGING_HOST }}:3001" >> "$GITHUB_STEP_SUMMARY"
          echo "- API: http://${{ secrets.STAGING_HOST }}:9009/api" >> "$GITHUB_STEP_SUMMARY"
        else
          echo "вқҢ йғЁзҪІеӨұиҙҘ" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "иҜ·жҹҘзңӢдёҠйқўзҡ„ SSH йғЁзҪІиҫ“еҮәе’Ңе®№еҷЁж—Ҙеҝ—гҖӮ" >> "$GITHUB_STEP_SUMMARY"
        fi
