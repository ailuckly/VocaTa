name: Deploy to Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment:
      name: staging

    steps:
    - name: ÚâĘšŻ▓ňł░ŠťŹňŐíňÖĘ
      uses: appleboy/ssh-action@v1.0.3
      env:
        GIT_REF: ${{ github.ref_name }}
        GIT_SHA: ${{ github.sha }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_TOKEN: ${{ github.token }}
      with:
        host: ${{ secrets.STAGING_HOST }}
        username: ${{ secrets.STAGING_USER }}
        key: ${{ secrets.STAGING_SSH_KEY }}
        port: 22
        script_stop: true
        envs: GIT_REF,GIT_SHA,GITHUB_REPOSITORY,GITHUB_TOKEN
        script: |
          set -e

          APP_DIR=/home/deploy/deploy/vocata
          REPO_DIR=$APP_DIR/repo
          ENV_FILE=$APP_DIR/.env
          LEGACY_ENV_FILE=$APP_DIR/data/vocata-staging.env
          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          mkdir -p "$APP_DIR"

          if [ ! -f "$ENV_FILE" ] && [ -f "$LEGACY_ENV_FILE" ]; then
            cp "$LEGACY_ENV_FILE" "$ENV_FILE"
          fi

          if [ ! -f "$ENV_FILE" ]; then
            echo "š╝║ň░ĹÚâĘšŻ▓šÄ»ňóâŠľçń╗Â: $ENV_FILE"
            echo "Ŕ»ĚňůłňťĘŠťŹňŐíňÖĘńŞŐňçćňĄçňąŻ .env´╝îňćŹÚçŹŠľ░ŠëžŔíîňĚąńŻťŠÁüŃÇé"
            exit 1
          fi

          if [ ! -d "$REPO_DIR/.git" ]; then
            rm -rf "$REPO_DIR"
            git clone --branch "$GIT_REF" --depth 1 "$REPO_URL" "$REPO_DIR"
          else
            cd "$REPO_DIR"
            git remote set-url origin "$REPO_URL"
            git fetch --depth 1 origin "$GIT_REF"
            git checkout "$GIT_REF"
            git reset --hard "origin/$GIT_REF"
          fi

          cd "$REPO_DIR"
          git remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"

          echo "ňŻôňëŹŠĆÉń║Ą: $GIT_SHA"
          docker compose --env-file "$ENV_FILE" up -d --build

          echo "=== ň«╣ňÖĘšŐÂŠÇü ==="
          docker compose ps

          echo "=== ňÉÄšź»ňüąň║ĚŠúÇŠčą ==="
          curl -fsS http://127.0.0.1:9009/api/health

    - name: ňĄ▒Ŕ┤ąŠŚÂŔżôňç║ŠŚąň┐Ś
      if: failure()
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.STAGING_HOST }}
        username: ${{ secrets.STAGING_USER }}
        key: ${{ secrets.STAGING_SSH_KEY }}
        port: 22
        script_stop: false
        script: |
          APP_DIR=/home/deploy/deploy/vocata
          REPO_DIR=$APP_DIR/repo

          if [ -d "$REPO_DIR" ]; then
            cd "$REPO_DIR"
            echo "=== docker compose ps ==="
            docker compose ps || true
            echo "=== vocata-server logs ==="
            docker compose logs --tail=100 vocata-server || true
            echo "=== vocata-web logs ==="
            docker compose logs --tail=60 vocata-web || true
            echo "=== vocata-admin logs ==="
            docker compose logs --tail=60 vocata-admin || true
          fi

    - name: ÚâĘšŻ▓š╗ôŠ×ťŠŐąňĹŐ
      if: always()
      run: |
        echo "## Staging ÚâĘšŻ▓š╗ôŠ×ť" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "- šÄ»ňóâ: staging" >> "$GITHUB_STEP_SUMMARY"
        echo "- ňłćŠö»: ${{ github.ref_name }}" >> "$GITHUB_STEP_SUMMARY"
        echo "- ŠĆÉń║Ą: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
        echo "- ŠťŹňŐíňÖĘ: \`${{ secrets.STAGING_HOST }}\`" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"

        if [ "${{ job.status }}" = "success" ]; then
          echo "Ôťů ÚâĘšŻ▓ŠłÉňŐč" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- šöĘŠłĚšź»: http://${{ secrets.STAGING_HOST }}:3000" >> "$GITHUB_STEP_SUMMARY"
          echo "- š«íšÉćšź»: http://${{ secrets.STAGING_HOST }}:3001" >> "$GITHUB_STEP_SUMMARY"
          echo "- API: http://${{ secrets.STAGING_HOST }}:9009/api" >> "$GITHUB_STEP_SUMMARY"
        else
          echo "ÔŁî ÚâĘšŻ▓ňĄ▒Ŕ┤ą" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Ŕ»ĚŠčąšťőńŞŐÚŁóšÜä SSH ÚâĘšŻ▓Ŕżôňç║ňĺîň«╣ňÖĘŠŚąň┐ŚŃÇé" >> "$GITHUB_STEP_SUMMARY"
        fi
