name: Deploy to Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  deploy-staging:
    runs-on: ubuntu-latest

    steps:
    - name: 部署到服务器
      uses: appleboy/ssh-action@v1.0.3
      env:
        GIT_REF: ${{ github.ref_name }}
        GIT_SHA: ${{ github.sha }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      with:
        host: ${{ secrets.STAGING_HOST }}
        username: ${{ secrets.STAGING_USER }}
        key: ${{ secrets.STAGING_SSH_KEY }}
        port: 22
        script_stop: true
        envs: GIT_REF,GIT_SHA,GITHUB_REPOSITORY
        script: |
          set -e

          APP_DIR=/home/deploy/deploy/vocata
          REPO_DIR=$APP_DIR/repo
          ENV_FILE=$APP_DIR/.env
          LEGACY_ENV_FILE=$APP_DIR/data/vocata-staging.env
          REPO_URL="https://github.com/${GITHUB_REPOSITORY}.git"

          mkdir -p "$APP_DIR"

          if [ ! -f "$ENV_FILE" ] && [ -f "$LEGACY_ENV_FILE" ]; then
            cp "$LEGACY_ENV_FILE" "$ENV_FILE"
          fi

          if [ ! -f "$ENV_FILE" ]; then
            echo "缺少部署环境文件: $ENV_FILE"
            echo "请先在服务器上准备好 .env，再重新执行工作流。"
            exit 1
          fi

          if [ ! -d "$REPO_DIR/.git" ]; then
            echo "[1/4] clone fresh repository"
            rm -rf "$REPO_DIR"
            git clone --branch "$GIT_REF" --depth 1 "$REPO_URL" "$REPO_DIR"
          else
            echo "[1/4] update repository"
            cd "$REPO_DIR"
            git remote set-url origin "$REPO_URL"
            git fetch --depth 1 origin "$GIT_REF"
            git checkout "$GIT_REF"
            git reset --hard "origin/$GIT_REF"
          fi

          cd "$REPO_DIR"
          git remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"

          echo "[2/4] deploy compose stack"
          echo "当前提交: $GIT_SHA"
          docker compose --env-file "$ENV_FILE" up -d --build --wait

          echo "[3/4] inspect compose status"
          echo "=== 容器状态 ==="
          docker compose --env-file "$ENV_FILE" ps

          echo "[4/4] check backend health"
          echo "=== 后端健康检查 ==="
          curl -fsS http://127.0.0.1:9009/api/health

    - name: 失败时输出日志
      if: failure()
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.STAGING_HOST }}
        username: ${{ secrets.STAGING_USER }}
        key: ${{ secrets.STAGING_SSH_KEY }}
        port: 22
        script_stop: false
        script: |
          APP_DIR=/home/deploy/deploy/vocata
          REPO_DIR=$APP_DIR/repo
          ENV_FILE=$APP_DIR/.env

          if [ -d "$REPO_DIR" ]; then
            cd "$REPO_DIR"
            echo "=== docker compose ps ==="
            docker compose --env-file "$ENV_FILE" ps || true
            echo "=== vocata-server logs ==="
            docker compose --env-file "$ENV_FILE" logs --tail=100 vocata-server || true
            echo "=== vocata-web logs ==="
            docker compose --env-file "$ENV_FILE" logs --tail=60 vocata-web || true
            echo "=== vocata-admin logs ==="
            docker compose --env-file "$ENV_FILE" logs --tail=60 vocata-admin || true
          fi

    - name: 部署结果报告
      if: always()
      run: |
        echo "## Staging 部署结果" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "- 环境: staging" >> "$GITHUB_STEP_SUMMARY"
        echo "- 分支: ${{ github.ref_name }}" >> "$GITHUB_STEP_SUMMARY"
        echo "- 提交: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
        echo "- 服务器: \`${{ secrets.STAGING_HOST }}\`" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"

        if [ "${{ job.status }}" = "success" ]; then
          echo "✅ 部署成功" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- 用户端: http://${{ secrets.STAGING_HOST }}:3000" >> "$GITHUB_STEP_SUMMARY"
          echo "- 管理端: http://${{ secrets.STAGING_HOST }}:3001" >> "$GITHUB_STEP_SUMMARY"
          echo "- API: http://${{ secrets.STAGING_HOST }}:9009/api" >> "$GITHUB_STEP_SUMMARY"
        else
          echo "❌ 部署失败" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "请查看上面的 SSH 部署输出和容器日志。" >> "$GITHUB_STEP_SUMMARY"
        fi
